<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Del Cugini — Espace d'édition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#1c6e3f;--green-deep:#0e4a28;--red:#b81e2c;
    --bg:#f3ead8;--panel:#fbf7ee;--card:#fffdf9;
    --ink:#23190f;--soft:#74634f;--faint:#9c8c76;
    --line:#e7dcc6;--line-2:#efe7d6;--gold:#c79a45;
    --shadow:24px 40px -28px rgba(40,28,12,.45);
    --r:14px;--ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);background:var(--bg);font-size:15px;line-height:1.5}
  .serif{font-family:'Fraunces',Georgia,serif}
  .app{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,540px);min-height:100vh}
  @media(max-width:1040px){.app{grid-template-columns:1fr}.preview{display:none}}

  /* ---------- en-tête ---------- */
  header.top{position:sticky;top:0;z-index:20;background:var(--green-deep);color:#fff;
    padding:18px 30px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    border-bottom:1px solid rgba(255,255,255,.08)}
  .brand{display:flex;flex-direction:column;line-height:1.15}
  .brand .k{font-size:.66rem;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .brand h1{margin:1px 0 0;font-size:1.35rem;font-weight:500;color:#fff}
  .brand h1 em{font-style:normal;color:var(--gold)}
  .sp{flex:1}
  .btn{display:inline-flex;align-items:center;gap:8px;border:none;border-radius:10px;
    padding:11px 18px;font-family:inherit;font-weight:600;font-size:.88rem;cursor:pointer;
    transition:transform .25s var(--ease),background .25s,box-shadow .25s,color .25s;white-space:nowrap}
  .btn svg{width:16px;height:16px;stroke-width:2}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--gold);color:#2a1c06;box-shadow:0 10px 22px -10px rgba(199,154,69,.8)}
  .btn-primary:hover{background:#d4ab57}
  .btn-soft{background:rgba(255,255,255,.12);color:#fff}
  .btn-soft:hover{background:rgba(255,255,255,.2)}
  .btn-ghost{background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.28)}
  .btn-ghost:hover{border-color:rgba(255,255,255,.6);color:#fff}

  /* ---------- corps ---------- */
  .editor{padding-bottom:90px}
  .intro{padding:22px 30px;border-bottom:1px solid var(--line);background:var(--panel)}
  .intro p{margin:0;color:var(--soft);font-size:.92rem;max-width:62ch}
  .intro b{color:var(--ink);font-weight:600}
  .intro code{font-family:'DM Sans';background:var(--line-2);border:1px solid var(--line);padding:1px 7px;border-radius:6px;font-size:.86em;color:var(--green-deep)}

  details.sec{border-bottom:1px solid var(--line);background:var(--panel)}
  details.sec>summary{cursor:pointer;padding:20px 30px;list-style:none;display:flex;align-items:center;gap:16px;user-select:none;transition:background .2s}
  details.sec>summary:hover{background:#f6efe1}
  details.sec>summary::-webkit-details-marker{display:none}
  summary .idx{font-family:'Fraunces',serif;font-size:.8rem;color:var(--gold);font-weight:600;width:24px;flex:none}
  summary .ti{font-family:'Fraunces',serif;font-size:1.22rem;font-weight:500;color:var(--ink);flex:1}
  summary .chev{width:16px;height:16px;color:var(--faint);transition:transform .25s var(--ease)}
  details.sec[open]>summary .chev{transform:rotate(90deg);color:var(--green)}
  details.sec[open]>summary{background:#f6efe1;border-bottom:1px solid var(--line-2)}
  .body{padding:20px 30px 28px}

  .row{margin:0 0 16px}
  .row:last-child{margin-bottom:0}
  .row label{display:block;font-size:.74rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  input[type=text],textarea,input[type=number]{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;
    font-size:.95rem;font-family:inherit;background:#fff;color:var(--ink);transition:border-color .2s,box-shadow .2s}
  textarea{min-height:70px;resize:vertical;line-height:1.5}
  input:focus,textarea:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(28,110,63,.1)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  /* couleurs */
  .colorrow{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-2)}
  .colorrow:last-child{border-bottom:none}
  .swatch{position:relative;width:42px;height:42px;flex:none;border-radius:11px;overflow:hidden;border:1px solid var(--line);box-shadow:inset 0 0 0 3px #fff}
  .swatch input[type=color]{position:absolute;inset:-6px;width:calc(100% + 12px);height:calc(100% + 12px);border:none;padding:0;cursor:pointer;background:none}
  .colorrow .lab{flex:1;font-weight:500;font-size:.94rem}
  .colorrow input[type=text]{width:120px;flex:none;font-family:'DM Sans';font-size:.86rem;text-transform:uppercase;letter-spacing:.03em;padding:9px 11px}

  /* cartes (plats, signatures, atouts) */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;position:relative;box-shadow:0 14px 26px -24px rgba(40,28,12,.5)}
  .card .rm{position:absolute;top:12px;right:12px;display:grid;place-items:center;width:32px;height:32px;border-radius:9px;
    background:transparent;color:var(--faint);border:1px solid var(--line);cursor:pointer;transition:.2s}
  .card .rm svg{width:15px;height:15px;stroke-width:1.8}
  .card .rm:hover{background:var(--red);color:#fff;border-color:var(--red)}
  .cardlabel{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:12px}

  .catbtns{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .catbtns button{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 18px;font-family:inherit;font-weight:600;font-size:.86rem;cursor:pointer;color:var(--soft);transition:.2s}
  .catbtns button:hover{border-color:var(--green)}
  .catbtns button.on{background:var(--green);color:#fff;border-color:var(--green)}

  .add{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;background:transparent;color:var(--green-deep);
    border:1.5px dashed var(--green);border-radius:12px;padding:13px;font-family:inherit;font-weight:600;font-size:.92rem;cursor:pointer;transition:.2s}
  .add svg{width:17px;height:17px;stroke-width:2}
  .add:hover{background:rgba(28,110,63,.06)}

  .note{font-size:.84rem;color:var(--soft);margin:2px 0 16px;font-style:italic}
  .divider{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;
    margin:22px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line-2)}

  .day{display:grid;grid-template-columns:130px 1fr auto;gap:11px;align-items:center;margin-bottom:9px}
  .day .ferme{display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;color:var(--soft);white-space:nowrap;cursor:pointer}
  .day .ferme input{accent-color:var(--red);width:15px;height:15px}

  /* aperçu */
  .preview{position:sticky;top:0;height:100vh;background:#1a1410;display:flex;flex-direction:column}
  .pbar{padding:14px 20px;color:#fff;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08);background:#15110d}
  .pbar .lab{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .pbar button{margin-left:auto;display:inline-flex;align-items:center;gap:7px;background:var(--green);color:#fff;border:none;border-radius:9px;padding:9px 16px;font-family:inherit;font-weight:600;cursor:pointer;font-size:.84rem;transition:.2s}
  .pbar button svg{width:15px;height:15px;stroke-width:2}
  .pbar button:hover{background:#23824c}
  .preview iframe{flex:1;width:100%;border:0;background:#fff}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--green-deep);color:#fff;
    padding:13px 24px;border-radius:11px;font-weight:600;font-size:.9rem;box-shadow:0 18px 40px -12px rgba(0,0,0,.55);
    opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:99;display:flex;align-items:center;gap:9px}
  .toast svg{width:17px;height:17px;color:var(--gold)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .warn{margin:24px 30px;padding:18px 20px;background:#fbeceb;border:1px solid #f0c9c6;border-radius:12px;color:#88121d}
  .warn b{font-weight:600}
</style>
</head>
<body>
<div class="app">
  <div class="editor">
    <header class="top">
      <div class="brand">
        <span class="k">Espace d'édition</span>
        <h1 class="serif">Pizzeria <em>Del Cugini</em></h1>
      </div>
      <span class="sp"></span>
      <button class="btn btn-ghost" onclick="reloadValues()" title="Revenir aux valeurs enregistrées">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>Annuler</button>
      <button class="btn btn-soft" onclick="copyConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>Copier</button>
      <button class="btn btn-primary" onclick="downloadConfig()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>Exporter config.js</button>
    </header>
    <div class="intro">
      <p>Modifie ce que tu veux ci-dessous ; à droite, <b>Prévisualiser</b> montre le rendu en direct.
      Une fois satisfait, <b>Exporter config.js</b> télécharge le fichier à déposer sur GitHub
      (à la racine du dépôt) pour publier les changements.</p>
    </div>
    <div id="sections"></div>
  </div>

  <div class="preview">
    <div class="pbar">
      <span class="lab">Aperçu en direct</span>
      <button onclick="refreshPreview()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>Prévisualiser</button>
    </div>
    <iframe id="frame" title="Aperçu du site"></iframe>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="config.js"></script>
<script>
"use strict";
/* icônes (ligne, sobres) */
var IC={
  trash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>'
};

/* ===== données de travail ===== */
var DEF = (window.SITE_CONFIG ? JSON.parse(JSON.stringify(window.SITE_CONFIG)) : {});
var W = JSON.parse(JSON.stringify(DEF));

var COLOR_LABELS = {
  "green":"Vert principal","green-deep":"Vert foncé","green-soft":"Vert clair",
  "red":"Rouge","red-deep":"Rouge foncé","cream":"Crème (fond)","cream-2":"Crème soutenu",
  "paper":"Fond des cartes","ink":"Texte principal","ink-soft":"Texte secondaire",
  "gold":"Or","gold-soft":"Or clair"
};
var TEXT_LABELS = {
  eyebrow:"Petit bandeau (au-dessus du titre)",heroLigne1:"Titre — ligne 1",heroLigne2:"Titre — ligne 2",
  heroLead:"Accroche (italique)",heroSub:"Paragraphe d'intro",heroBouton:"Bouton du hero",
  navTrouver:"Bouton nav — gauche",navContact:"Bouton nav — droite (appel)",
  aboutKick:"La maison — petit titre",aboutTitre:"La maison — titre",aboutTexte:"La maison — paragraphe",
  specialitesKick:"Spécialités — petit titre",specialitesTitre:"Spécialités — titre",specialitesSousTitre:"Spécialités — sous-titre",
  carteKick:"Carte — petit titre",carteTitre:"Carte — titre",carteSousTitre:"Carte — sous-titre",
  infosKick:"Infos — petit titre",infosTitre:"Infos — titre",infosSousTitre:"Infos — sous-titre",
  footerTexte:"Footer — texte de présentation",footerBas1:"Footer — bas (gauche)",footerBas2:"Footer — bas (droite)"
};
var INFO_LABELS = {
  nom:"Nom de l'établissement",telephone:"Téléphone (liens d'appel, sans espaces)",telephoneAffiche:"Téléphone affiché",
  adresseLigne1:"Adresse — ligne 1",adresseLigne2:"Adresse — ligne 2",adresseComplete:"Adresse complète (Google Maps)",
  services:"Services",facebook:"Lien Facebook",instagram:"Lien Instagram",horairesResume:"Horaires (résumé footer)"
};
var CATS = [["pizzas","Pizzas"],["pates","Pâtes"],["salades","Salades"],["desserts","Desserts"],["boissons","Boissons"]];
var FEATURE_LABELS = ["Atout 1","Atout 2","Atout 3","Atout 4"];

/* ===== helpers DOM ===== */
function el(tag, cls, html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function rowInput(labelTxt, value, oninput, multiline){
  var r=el('div','row');
  r.appendChild(el('label',null,labelTxt));
  var i = multiline ? el('textarea') : el('input');
  if(!multiline) i.type='text';
  i.value=(value==null?'':value);
  i.addEventListener('input',function(){ oninput(i.value); });
  r.appendChild(i);
  return r;
}
function numInput(value, oninput, ph){
  var i=el('input'); i.type='number'; i.step='0.50'; i.placeholder=ph||''; i.style.width='100%';
  i.value=(value==null?'':value);
  i.addEventListener('input',function(){ oninput(i.value); });
  return i;
}

/* ===== sections ===== */
function build(){
  var root=document.getElementById('sections'); root.innerHTML=''; secCount=0;

  root.appendChild(section('Couleurs', function(b){
    Object.keys(W.couleurs||{}).forEach(function(k){
      var rr=el('div','colorrow');
      var sw=el('div','swatch');
      var c=el('input'); c.type='color'; c.value=toHex(W.couleurs[k]); sw.appendChild(c);
      var t=el('input'); t.type='text'; t.value=W.couleurs[k];
      c.addEventListener('input',function(){ W.couleurs[k]=c.value; t.value=c.value; });
      t.addEventListener('input',function(){ W.couleurs[k]=t.value; if(/^#([0-9a-f]{6}|[0-9a-f]{3})$/i.test(t.value))c.value=toHex(t.value); });
      rr.appendChild(sw); rr.appendChild(el('span','lab',COLOR_LABELS[k]||k)); rr.appendChild(t);
      b.appendChild(rr);
    });
  }, true));

  root.appendChild(section('Infos pratiques', function(b){
    Object.keys(INFO_LABELS).forEach(function(k){
      if(W.infos[k]===undefined) return;
      b.appendChild(rowInput(INFO_LABELS[k], W.infos[k], function(v){ W.infos[k]=v; }));
    });
  }));

  root.appendChild(section('Horaires', function(b){
    b.appendChild(el('div','note','Décoche « Fermé » pour saisir des horaires. Le résumé du footer se règle dans « Infos pratiques ».'));
    (W.infos.horaires||[]).forEach(function(h){
      var d=el('div','day');
      var j=el('input'); j.type='text'; j.value=h.jour; j.addEventListener('input',function(){h.jour=j.value;});
      var v=el('input'); v.type='text'; v.value=h.valeur; v.addEventListener('input',function(){h.valeur=v.value;});
      var wrap=el('label','ferme');
      var cb=el('input'); cb.type='checkbox'; cb.checked=!!h.ferme;
      cb.addEventListener('change',function(){ h.ferme=cb.checked; if(cb.checked){h.valeur='Fermé'; v.value='Fermé';} });
      wrap.appendChild(cb); wrap.appendChild(document.createTextNode('Fermé'));
      d.appendChild(j); d.appendChild(v); d.appendChild(wrap);
      b.appendChild(d);
    });
  }));

  root.appendChild(section('Textes', function(b){
    Object.keys(TEXT_LABELS).forEach(function(k){
      if(W.textes[k]===undefined) return;
      var ml = /Texte|Sous|Para|Lead|Sub/i.test(TEXT_LABELS[k]) || (W.textes[k]&&W.textes[k].length>60);
      b.appendChild(rowInput(TEXT_LABELS[k], W.textes[k], function(v){ W.textes[k]=v; }, ml));
    });
    b.appendChild(el('div','divider','Les 4 atouts — section « La maison »'));
    (W.textes.features||[]).forEach(function(f,i){
      var c=el('div','card');
      c.appendChild(el('div','cardlabel',FEATURE_LABELS[i]));
      c.appendChild(rowInput('Titre', f.titre, function(v){f.titre=v;}));
      c.appendChild(rowInput('Texte', f.texte, function(v){f.texte=v;}, true));
      b.appendChild(c);
    });
  }));

  root.appendChild(section('Images & spécialités', function(b){
    b.appendChild(el('div','note','Indique le nom du fichier (placé dans le dossier image/). Ex : image/ma-photo.jpg'));
    b.appendChild(rowInput('Photo du hero (grand fond)', W.images.hero, function(v){W.images.hero=v;}));
    b.appendChild(rowInput('Photo « La maison »', W.images.about, function(v){W.images.about=v;}));
    b.appendChild(el('div','divider','Les 4 pizzas « Spécialités »'));
    (W.images.signatures||[]).forEach(function(s){
      var c=el('div','card');
      c.appendChild(rowInput('Nom', s.nom, function(v){s.nom=v;}));
      c.appendChild(rowInput('Description', s.desc, function(v){s.desc=v;}, true));
      var g=el('div','grid2');
      g.appendChild(rowInput('Prix affiché', s.prix, function(v){s.prix=v;}));
      g.appendChild(rowInput('Badge (ex : Signature)', s.tag, function(v){s.tag=v;}));
      c.appendChild(g);
      c.appendChild(rowInput('Fichier image', s.fichier, function(v){s.fichier=v;}));
      b.appendChild(c);
    });
  }));

  root.appendChild(menuSection());
}

var secCount=0;
function section(title, fill, open){
  secCount++;
  var d=el('details','sec'); if(open)d.open=true;
  var idx=(secCount<10?'0':'')+secCount;
  var sum=el('summary');
  sum.appendChild(el('span','idx',idx));
  sum.appendChild(el('span','ti',title));
  sum.appendChild(el('span','chev','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>'));
  d.appendChild(sum);
  var b=el('div','body'); fill(b); d.appendChild(b);
  return d;
}

/* ----- Menu ----- */
var curCat='pizzas';
function menuSection(){
  secCount++;
  var d=el('details','sec');
  var idx=(secCount<10?'0':'')+secCount;
  var sum=el('summary');
  sum.appendChild(el('span','idx',idx));
  sum.appendChild(el('span','ti','Menu & prix'));
  sum.appendChild(el('span','chev','<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>'));
  d.appendChild(sum);
  var b=el('div','body');
  var bar=el('div','catbtns');
  CATS.forEach(function(c){
    var btn=el('button',c[0]===curCat?'on':'',c[1]);
    btn.addEventListener('click',function(){ curCat=c[0]; renderMenu(); bar.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); btn.classList.add('on'); });
    bar.appendChild(btn);
  });
  b.appendChild(bar);
  b.appendChild(el('div',null,'<div id="menuList"></div>'));
  d.appendChild(b);
  setTimeout(renderMenu,0);
  return d;
}
function renderMenu(){
  var host=document.getElementById('menuList'); if(!host)return; host.innerHTML='';
  var cat=curCat, isPizza=(cat==='pizzas');
  var data=W.menu[cat]; if(!data){host.innerHTML='—';return;}
  host.appendChild(rowInput('Texte d\'intro de la catégorie (HTML)', data.note, function(v){data.note=v;}, true));
  host.appendChild(rowInput('Mention supplément (HTML, vide si aucune)', data.supp, function(v){data.supp=v;}));
  host.appendChild(el('div','divider','Plats'));
  data.items.forEach(function(it,idx){
    var c=el('div','card');
    var rm=el('button','rm',IC.trash); rm.title='Supprimer ce plat';
    rm.addEventListener('click',function(){ var nom=it[0]; data.items.splice(idx,1); if(W.photosMenu[cat])delete W.photosMenu[cat][nom]; renderMenu(); });
    c.appendChild(rm);
    c.appendChild(rowInput('Nom', it[0], function(v){ renameItem(cat,it,v); it[0]=v; }));
    c.appendChild(rowInput('Ingrédients', it[1], function(v){ it[1]=v; }));
    if(isPizza){
      var g=el('div','grid2');
      var w1=el('div','row'); w1.appendChild(el('label',null,'Prix 24 cm (€)')); w1.appendChild(numInput(it[2],function(v){ it[2]=parsePrice(v); }));
      var w2=el('div','row'); w2.appendChild(el('label',null,'Prix 29 cm (€)')); w2.appendChild(numInput(it[3],function(v){ it[3]=parsePrice(v); }));
      g.appendChild(w1); g.appendChild(w2); c.appendChild(g);
      c.appendChild(rowInput('Badge (optionnel : Maison, Signature…)', it[4], function(v){ if(v)it[4]=v; else it.length=4; }));
    }else{
      var pr=el('div','row'); pr.appendChild(el('label',null,'Prix (€) — laisser vide = « voir détail »')); pr.appendChild(numInput(it[2],function(v){ it[2]=parsePrice(v); }));
      c.appendChild(pr);
    }
    var ph=(W.photosMenu[cat]&&W.photosMenu[cat][it[0]])||'';
    c.appendChild(rowInput('Photo (ex : image/menu/ma-pizza.jpg — vide = placeholder)', ph, function(v){ setPhoto(cat,it[0],v); }));
    host.appendChild(c);
  });
  var add=el('button','add',IC.plus+'<span>Ajouter un plat</span>');
  add.addEventListener('click',function(){ data.items.push(isPizza?['Nouveau plat','ingrédients',0,0]:['Nouveau plat','ingrédients',0]); renderMenu(); });
  host.appendChild(add);
}
function renameItem(cat,it,newName){
  var old=it[0]; if(old===newName)return;
  if(W.photosMenu[cat]&&W.photosMenu[cat][old]!=null){ W.photosMenu[cat][newName]=W.photosMenu[cat][old]; delete W.photosMenu[cat][old]; }
}
function parsePrice(v){ v=(''+v).trim().replace(',','.'); if(v==='')return null; var n=parseFloat(v); return isNaN(n)?null:n; }
function setPhoto(cat,nom,v){ if(!W.photosMenu[cat])W.photosMenu[cat]={}; if(v) W.photosMenu[cat][nom]=v; else delete W.photosMenu[cat][nom]; }

function toHex(v){ if(!v)return '#000000'; v=(''+v).trim(); if(/^#[0-9a-f]{3}$/i.test(v)){return '#'+v[1]+v[1]+v[2]+v[2]+v[3]+v[3];} if(/^#[0-9a-f]{6}$/i.test(v))return v; return '#000000'; }

/* ===== export ===== */
function buildJS(){
  return "/* ============================================================\n"
       + "   CONFIGURATION DU SITE — Pizzeria Del Cugini\n"
       + "   Généré par admin.html — remplace ce fichier sur GitHub pour publier.\n"
       + "   ============================================================ */\n"
       + "window.SITE_CONFIG = " + JSON.stringify(W, null, 2) + ";\n";
}
function downloadConfig(){
  var blob=new Blob([buildJS()],{type:'text/javascript;charset=utf-8'});
  var a=el('a'); a.href=URL.createObjectURL(blob); a.download='config.js'; document.body.appendChild(a); a.click(); a.remove();
  toast('config.js téléchargé — remplace-le sur GitHub');
}
function copyConfig(){
  var txt=buildJS();
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){toast('Copié dans le presse-papier');},function(){fallbackCopy(txt);}); }
  else fallbackCopy(txt);
}
function fallbackCopy(txt){ var t=el('textarea'); t.value=txt; document.body.appendChild(t); t.select(); try{document.execCommand('copy');toast('Copié');}catch(e){toast('Copie impossible');} t.remove(); }
function reloadValues(){ W=JSON.parse(JSON.stringify(DEF)); build(); toast('Valeurs réinitialisées'); }

/* ===== aperçu live ===== */
function refreshPreview(){
  try{ localStorage.setItem('dc_preview_config', JSON.stringify(W)); }catch(e){}
  document.getElementById('frame').src='index.html?preview&t='+(new Date().getTime());
  toast('Aperçu mis à jour');
}

/* ===== toast ===== */
var toTimer; function toast(m){ var t=document.getElementById('toast'); t.innerHTML=IC.check+'<span>'+m+'</span>'; t.classList.add('show'); clearTimeout(toTimer); toTimer=setTimeout(function(){t.classList.remove('show');},2400); }

/* ===== init ===== */
if(!window.SITE_CONFIG){
  document.getElementById('sections').innerHTML='<div class="warn"><b>config.js introuvable.</b> Ouvre ce panneau depuis le même dossier que config.js et index.html.</div>';
}else{
  build();
  try{ localStorage.setItem('dc_preview_config', JSON.stringify(W)); }catch(e){}
  document.getElementById('frame').src='index.html?preview&t='+(new Date().getTime());
}
</script>
</body>
